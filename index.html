<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一铲一刷，一眼千年｜三星堆发现100周年H5</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06110f;
      color: #f7f0df;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(212,174,98,.20), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(71,124,106,.20), transparent 28%),
        linear-gradient(180deg, #07100f 0%, #0d1715 52%, #050807 100%);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      opacity: .055;
      background-image:
        linear-gradient(rgba(255,255,255,.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.28) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    #app {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .phone {
      width: min(410px, 100%);
      height: 92vh;
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.035));
      box-shadow: 0 22px 80px rgba(0,0,0,.52);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: 15px 18px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #d8cfbd;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
    }

    .header {
      padding: 0 18px 8px;
    }

    .eyebrow {
      margin-bottom: 7px;
      color: #d4ae62;
      font-size: 12px;
      letter-spacing: .32em;
    }

    .page-title {
      font-size: 26px;
      line-height: 1.2;
      font-weight: 800;
    }

    .main {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px 18px 18px;
      -webkit-overflow-scrolling: touch;
    }

    .main::-webkit-scrollbar {
      width: 4px;
    }

    .main::-webkit-scrollbar-thumb {
      background: rgba(212,174,98,.45);
      border-radius: 99px;
    }

    .nav {
      border-top: 1px solid rgba(255,255,255,.1);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.78));
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      outline: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(.98);
    }

    button:disabled {
      opacity: .3;
      cursor: default;
    }

    .nav-button {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: #f4d38a;
      font-size: 18px;
    }

    .dots {
      flex: 1;
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      padding: 0;
      border-radius: 99px;
      background: rgba(255,255,255,.27);
    }

    .dot.active {
      width: 26px;
      background: #d4ae62;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 40px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -1px;
    }

    h3 {
      font-size: 22px;
      line-height: 1.35;
    }

    .card {
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 24px;
      padding: 16px;
      background: rgba(255,255,255,.06);
    }

    .dark {
      background: rgba(0,0,0,.25);
    }

    .gold-card {
      border-color: rgba(212,174,98,.30);
      background: rgba(212,174,98,.11);
    }

    .text {
      color: #e6ddca;
      font-size: 15.5px;
      line-height: 1.9;
    }

    .small {
      font-size: 12px;
    }

    .muted {
      color: #c8bfae;
    }

    .gold {
      color: #d4ae62;
    }

    .center {
      text-align: center;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .mt8 { margin-top: 8px; }
    .mt10 { margin-top: 10px; }
    .mt12 { margin-top: 12px; }
    .mt14 { margin-top: 14px; }
    .mt16 { margin-top: 16px; }
    .mt20 { margin-top: 20px; }
    .mb12 { margin-bottom: 12px; }
    .mb16 { margin-bottom: 16px; }

    .pill {
      display: inline-flex;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid rgba(212,174,98,.34);
      background: rgba(212,174,98,.12);
      color: #f4d38a;
      font-size: 12px;
    }

    .primary {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border-radius: 999px;
      background: #d4ae62;
      color: #120e06;
      padding: 12px 28px;
      font-weight: 800;
      box-shadow: 0 0 35px rgba(212,174,98,.35);
    }

    .outline {
      border: 1px solid rgba(212,174,98,.45);
      background: rgba(212,174,98,.14);
      color: #f4d38a;
      border-radius: 18px;
      padding: 12px;
      font-weight: 700;
    }

    .tab {
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 20px;
      padding: 12px;
      background: rgba(255,255,255,.06);
      text-align: left;
      transition: .2s ease;
    }

    .tab.active {
      border-color: rgba(212,174,98,.75);
      background: rgba(212,174,98,.16);
    }

    .icon-box {
      width: 50px;
      height: 50px;
      flex-shrink: 0;
      border-radius: 17px;
      display: grid;
      place-items: center;
      background: rgba(212,174,98,.16);
      color: #d4ae62;
      font-size: 24px;
    }

    .visual {
      height: 220px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.11);
      background: radial-gradient(circle at 50% 38%, rgba(212,174,98,.20), transparent 34%), rgba(0,0,0,.25);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .mask {
      position: relative;
      width: 310px;
      max-width: 100%;
      height: 190px;
      margin: 0 auto;
      filter: drop-shadow(0 0 28px rgba(212,174,98,.22));
    }

    .face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 86%;
      height: 62%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #7aa38c, #21483e 48%, #b88a3f);
      clip-path: polygon(5% 50%, 13% 14%, 34% 0, 50% 18%, 66% 0, 87% 14%, 95% 50%, 86% 86%, 62% 100%, 50% 84%, 38% 100%, 14% 86%);
    }

    .eye {
      position: absolute;
      top: 44%;
      width: 22%;
      height: 15%;
      border-radius: 50%;
      background: #061915;
    }

    .eye::after {
      content: "";
      position: absolute;
      inset: 20%;
      border-radius: 50%;
      background: #d7a94c;
    }

    .eye.left { left: 22%; }
    .eye.right { right: 22%; }

    .nose {
      position: absolute;
      left: 50%;
      top: 39%;
      width: 16%;
      height: 48%;
      transform: translateX(-50%);
      background: rgba(8,32,28,.72);
      clip-path: polygon(50% 0, 82% 82%, 50% 100%, 18% 82%);
    }

    .mouth {
      position: absolute;
      left: 30%;
      right: 30%;
      bottom: 23%;
      height: 16px;
      border-bottom: 7px solid rgba(214,167,81,.9);
      border-radius: 0 0 80px 80px;
    }

    .glow {
      position: absolute;
      top: 32%;
      width: 30%;
      height: 28%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(248,211,122,.75), transparent 70%);
      animation: pulse 3s infinite;
    }

    .glow.left { left: 17%; }
    .glow.right { right: 17%; animation-delay: 1.4s; }

    @keyframes pulse {
      0%,100% { opacity: .25; transform: scale(.94); }
      50% { opacity: .85; transform: scale(1.08); }
    }

    .tree {
      width: 155px;
      height: 200px;
      position: relative;
    }

    .tree .trunk {
      position: absolute;
      left: 50%;
      bottom: 12px;
      width: 14px;
      height: 165px;
      transform: translateX(-50%);
      border-radius: 99px;
      background: linear-gradient(#8bb39a, #c79b4b);
    }

    .branch {
      position: absolute;
      width: 86px;
      height: 8px;
      border-radius: 99px;
      background: linear-gradient(90deg, #8bb39a, #c79b4b);
    }

    .b1 { left: 8px; top: 45px; transform: rotate(-22deg); }
    .b2 { right: 8px; top: 70px; transform: rotate(202deg); }
    .b3 { left: 14px; top: 112px; transform: rotate(-16deg); }

    .sun-dot {
      position: absolute;
      left: 50%;
      top: 12px;
      width: 34px;
      height: 34px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #d4ae62;
      box-shadow: 0 0 22px rgba(212,174,98,.45);
    }

    .man {
      width: 110px;
      height: 180px;
      position: relative;
    }

    .man::before {
      content: "";
      position: absolute;
      left: 38px;
      top: 2px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #c99b50;
      box-shadow: 0 -13px 0 -2px #315b50;
    }

    .man::after {
      content: "";
      position: absolute;
      left: 31px;
      top: 43px;
      width: 48px;
      height: 116px;
      border-radius: 24px 24px 16px 16px;
      background: linear-gradient(#5f8d78, #1f453d);
      border: 5px solid #c99b50;
    }

    .arms {
      position: absolute;
      left: 9px;
      top: 76px;
      width: 92px;
      height: 30px;
      border: 9px solid #c99b50;
      border-top: 0;
      border-radius: 0 0 40px 40px;
      z-index: 2;
    }

    .staff {
      width: 26px;
      height: 180px;
      border-radius: 99px;
      background: linear-gradient(#f4d38a, #a9762f);
      transform: rotate(-18deg);
      box-shadow: 0 0 26px rgba(212,174,98,.35);
      position: relative;
    }

    .staff::before,
    .staff::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 42px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 99px;
      background: #6b4b20;
    }

    .staff::before { top: 42px; }
    .staff::after { bottom: 45px; }

    .gold-mask {
      width: 160px;
      height: 125px;
      background: linear-gradient(135deg, #ffe2a1, #b98533);
      clip-path: polygon(10% 15%, 50% 0, 90% 15%, 96% 55%, 76% 94%, 50% 82%, 24% 94%, 4% 55%);
      position: relative;
      box-shadow: 0 0 32px rgba(212,174,98,.35);
    }

    .gold-mask::before,
    .gold-mask::after {
      content: "";
      position: absolute;
      top: 48px;
      width: 34px;
      height: 12px;
      border-radius: 50%;
      background: #2a1c0d;
    }

    .gold-mask::before { left: 35px; }
    .gold-mask::after { right: 35px; }

    .wheel {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 12px solid #d4ae62;
      position: relative;
    }

    .wheel::before {
      content: "";
      position: absolute;
      inset: 40px;
      border-radius: 50%;
      border: 10px solid #d4ae62;
    }

    .spoke {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 72px;
      background: #d4ae62;
      transform-origin: 50% 0;
    }

    .s1 { transform: rotate(0); }
    .s2 { transform: rotate(45deg); }
    .s3 { transform: rotate(90deg); }
    .s4 { transform: rotate(135deg); }

    .jade-object {
      width: 160px;
      height: 120px;
      position: relative;
    }

    .jade-object span {
      position: absolute;
      border: 8px solid #c6a25f;
      background: rgba(86,137,112,.82);
      box-shadow: inset 0 0 20px rgba(0,0,0,.35);
    }

    .jade-object .j1 {
      left: 24px;
      top: 5px;
      width: 88px;
      height: 88px;
      border-radius: 24px;
    }

    .jade-object .j2 {
      right: 18px;
      bottom: 5px;
      width: 78px;
      height: 42px;
      border-radius: 20px;
    }

    .dirt {
      position: relative;
      height: 260px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.11);
      background: radial-gradient(circle at 50% 36%, rgba(229,180,82,.25), transparent 36%), linear-gradient(180deg, #382518, #130d09);
    }

    .jade {
      position: absolute;
      left: 50%;
      top: 48%;
      width: 160px;
      height: 125px;
      transform: translate(-50%, -50%);
      border: 9px solid #c6a25f;
      border-radius: 42%;
      background: rgba(48,88,72,.8);
      box-shadow: inset 0 0 24px rgba(0,0,0,.5), 0 0 35px rgba(214,166,82,.32);
    }

    .dust {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 30%, #654531 0 3px, transparent 4px),
        radial-gradient(circle at 70% 60%, #7b563b 0 4px, transparent 5px),
        linear-gradient(135deg, #6c4b35, #2b1b12);
      background-size: 24px 24px, 32px 32px, cover;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #d4ae62;
    }

    .seg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.055);
      border-radius: 16px;
      padding: 4px;
    }

    .seg button {
      border-radius: 12px;
      padding: 9px 12px;
      background: transparent;
      color: #c8bfae;
    }

    .seg button.active {
      background: #d4ae62;
      color: #15110a;
      font-weight: 800;
    }

    .fade {
      animation: enter .25s ease both;
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-height: 720px) {
      .phone { height: 95vh; }
      .visual { height: 195px; }
      .dirt { height: 230px; }
      h1 { font-size: 34px; }
      .page-title { font-size: 23px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <section class="phone">
      <div class="topbar">
        <div class="badge">三星堆发现100周年 H5</div>
        <div id="count">1 / 8</div>
      </div>
      <div class="header" id="header"></div>
      <main class="main" id="main"></main>
      <div class="nav">
        <button class="nav-button" id="prev">⌃</button>
        <div class="dots" id="dots"></div>
        <button class="nav-button" id="next">⌄</button>
      </div>
    </section>
  </div>

  <script>
    var pages = [
      { eyebrow: "", title: "" },
      { eyebrow: "第一章", title: "1926，第一道光" },
      { eyebrow: "第二章", title: "1926—2026百年考古接力" },
      { eyebrow: "第三章", title: "他们不是在“挖宝”" },
      { eyebrow: "第四章", title: "文物的前世今生" },
      { eyebrow: "第五章", title: "百年接力中的人" },
      { eyebrow: "第六章", title: "三星堆为什么重要" },
      { eyebrow: "", title: "" }
    ];

    var timeline = [
      ["1926", "百年纪念轴起点", "本作品以1926—2026作为百年叙事轴，回望古蜀遗存从被看见、被记录到被研究、被守护的过程。"],
      ["1934", "首次科学发掘", "学术力量进入现场，三星堆逐步从民间发现走向科学考古。"],
      ["1986", "一醒惊天下", "1、2号祭祀坑出土大量青铜器、金器、玉器，三星堆以震撼姿态进入世界视野。"],
      ["2020—2022", "科技考古接力", "新一轮发掘中，多学科检测、现场保护、数字记录与文物提取同步推进。"],
      ["2026", "百年回望", "百年不是终点，而是下一次追问的开始：让文物被看见，也让考古人的劳动被记住。"]
    ];

    var tools = [
      ["🖌️", "毛刷", "一点点扫开浮土。动作越轻，留下的信息越完整。"],
      ["📏", "测绘", "每一处位置、深度、方向，都要被准确记录。"],
      ["📷", "影像记录", "在文物移动之前，先让现场状态被永久保存。"],
      ["🏷️", "编号", "一个编号，就是文物回到历史现场的线索。"],
      ["🔬", "检测", "显微之下，泥土、残留物和材料都可能开口说话。"],
      ["🛡️", "保护", "出土不是终点，守护才刚开始。"]
    ];

    var relics = [
      ["青铜纵目面具", "凝望", "mask", "它也许承载着古蜀人关于祖先、神灵与远方的想象。", "今天，它成为三星堆最具辨识度的视觉符号之一。"],
      ["青铜大立人", "庄严", "man", "高冠、长衣、环握双手，让人联想到仪式、权力与神圣空间。", "它帮助我们观察古蜀人的服饰、姿态、礼仪和社会结构。"],
      ["青铜神树", "连接", "tree", "树、鸟与枝叶构成通向天地的象征空间。", "从残片到重新挺立，它的修复展示了文保工作的耐心和技术。"],
      ["金杖", "权力", "staff", "金色与图像可能共同指向权力、仪式和神圣性。", "它帮助研究者思考古蜀的权力表达。"],
      ["金面具", "光芒", "goldmask", "金色或许与身份、祭祀和神圣感有关。", "薄而脆弱的金器，需要极其谨慎地提取、展开、加固和保存。"],
      ["青铜太阳轮", "日光", "wheel", "圆形与放射状结构容易让人联想到太阳、光明与时间秩序。", "它让公众直观感受三星堆文物中强烈的符号性。"],
      ["玉璋与玉琮", "礼器", "jade", "玉器可能参与礼仪、祭祀或权力表达。", "它们帮助研究者理解三星堆与其他区域文化之间的联系。"]
    ];

    var people = [
      ["燕道诚、燕青保父子", "早期发现线索的人", "他们在劳作中发现玉石器，使广汉玉器逐渐进入公众与学术视野。", "很多伟大发现，都从一次普通的劳动开始。"],
      ["葛维汉", "首次科学发掘组织者", "他组织考古队对三星堆进行早期科学发掘。", "把偶然发现带入科学记录，是百年研究的重要起点。"],
      ["陈德安", "1986年祭祀坑主要发掘者", "他长期从事三星堆考古，是1、2号祭祀坑的重要发掘者之一。", "面对未知，他把震惊变成记录，把惊喜变成证据。"],
      ["雷雨与新一代考古团队", "当代考古与文保力量", "他们推动遗址保护、发掘研究、多学科合作和公众传播。", "真正的接力，是把前人的问题继续问下去。"]
    ];

    var meanings = [
      ["多元一体", "三星堆让我们看到中华文明并不是单线展开，而是在多区域交流互鉴中形成丰富面貌。"],
      ["科技考古", "检测、扫描、记录和实验室保护，让考古证据更精确。"],
      ["文物保护", "出土不是终点，清理、检测、加固和保存决定文物能否走向未来。"],
      ["公众传播", "让更多人看见文物，也看见文物背后一代代考古人的劳动。"]
    ];

    var state = {
      page: 0,
      clean: 30,
      line: 0,
      tool: 0,
      relic: 0,
      mode: "pre",
      person: 0,
      pieces: []
    };

    function byId(id) {
      return document.getElementById(id);
    }

    function mask(glow) {
      return '<div class="mask">' +
        (glow ? '<span class="glow left"></span><span class="glow right"></span>' : '') +
        '<div class="face"></div>' +
        '<div class="eye left"></div>' +
        '<div class="eye right"></div>' +
        '<div class="nose"></div>' +
        '<div class="mouth"></div>' +
      '</div>';
    }

    function visual(type) {
      if (type === "mask") return mask(false);
      if (type === "tree") return '<div class="tree"><div class="sun-dot"></div><div class="trunk"></div><div class="branch b1"></div><div class="branch b2"></div><div class="branch b3"></div></div>';
      if (type === "man") return '<div class="man"><div class="arms"></div></div>';
      if (type === "staff") return '<div class="staff"></div>';
      if (type === "goldmask") return '<div class="gold-mask"></div>';
      if (type === "wheel") return '<div class="wheel"><span class="spoke s1"></span><span class="spoke s2"></span><span class="spoke s3"></span><span class="spoke s4"></span></div>';
      return '<div class="jade-object"><span class="j1"></span><span class="j2"></span></div>';
    }

    function go(pageIndex) {
      if (pageIndex < 0) pageIndex = 0;
      if (pageIndex > pages.length - 1) pageIndex = pages.length - 1;
      state.page = pageIndex;
      render();
    }

    function renderHeader() {
      var page = pages[state.page];
      if (!page.title) {
        byId('header').innerHTML = '';
      } else {
        byId('header').innerHTML = '<div class="eyebrow">' + page.eyebrow + '</div><div class="page-title">' + page.title + '</div>';
      }
    }

    function renderDots() {
      var html = '';
      for (var i = 0; i < pages.length; i++) {
        html += '<button class="dot ' + (i === state.page ? 'active' : '') + '" data-page="' + i + '"></button>';
      }
      byId('dots').innerHTML = html;
    }

    function render() {
      byId('count').innerHTML = (state.page + 1) + ' / ' + pages.length;
      renderHeader();
      renderDots();
      byId('prev').disabled = state.page === 0;
      byId('next').disabled = state.page === pages.length - 1;

      var pageHtml = '';
      if (state.page === 0) pageHtml = coverPage();
      if (state.page === 1) pageHtml = firstPage();
      if (state.page === 2) pageHtml = timelinePage();
      if (state.page === 3) pageHtml = toolsPage();
      if (state.page === 4) pageHtml = relicPage();
      if (state.page === 5) pageHtml = peoplePage();
      if (state.page === 6) pageHtml = meaningPage();
      if (state.page === 7) pageHtml = endingPage();

      byId('main').innerHTML = pageHtml;
      byId('main').scrollTop = 0;
      bindEvents();
    }

    function coverPage() {
      return '<section class="center fade" style="min-height:100%;display:flex;flex-direction:column;justify-content:center">' +
        '<div class="pill" style="margin:0 auto 12px">1926—2026</div>' +
        mask(true) +
        '<h1 class="mt12">一铲一刷<br>一眼千年</h1>' +
        '<p class="text mt14">三星堆发现100周年互动纪念H5<br>聚焦考古工作者的辛勤努力与文物的前世今生。</p>' +
        '<div class="card mt20" style="text-align:left"><div class="gold mb12">核心主题</div><p class="text small" style="font-size:14px">从泥土到展柜，从发现到守护，从古蜀文明到今天的我们。</p></div>' +
        '<button class="primary mt20" id="startBtn">开始探寻</button>' +
      '</section>';
    }

    function firstPage() {
      var dust = 1 - state.clean / 100;
      return '<section class="fade">' +
        '<div class="dirt">' +
          '<div class="jade" style="opacity:' + (.35 + state.clean / 120) + '"></div>' +
          '<div class="dust" style="opacity:' + dust + '"></div>' +
          '<div class="pill" style="position:absolute;left:16px;top:16px">拖动滑块刷去泥土</div>' +
          '<div class="card dark" style="position:absolute;left:16px;right:16px;bottom:16px;padding:14px;border-radius:18px">' +
            '<div class="between small mb12"><span>文物显露度</span><span>' + state.clean + '%</span></div>' +
            '<input id="cleanRange" type="range" min="0" max="100" value="' + state.clean + '">' +
          '</div>' +
        '</div>' +
        '<div class="card mt20"><p class="text">从泥土中露出的，不只是一件器物，也是一段文明重新被看见的开始。</p></div>' +
      '</section>';
    }

    function timelinePage() {
      var active = timeline[state.line];
      var html = '<section class="fade stack">';
      for (var i = 0; i < timeline.length; i++) {
        var t = timeline[i];
        html += '<button class="tab ' + (i === state.line ? 'active' : '') + '" data-line="' + i + '">' +
          '<div class="row"><div class="icon-box">' + t[0].split('—')[0] + '</div>' +
          '<div><b>' + t[1] + '</b><p class="small muted mt8" style="line-height:1.7">' + t[2] + '</p></div></div>' +
        '</button>';
      }
      html += '<div class="card dark"><div style="font-size:36px;font-weight:900;color:#d4ae62">' + active[0] + '</div><p class="text mt8">' + active[2] + '</p></div>';
      html += '</section>';
      return html;
    }

    function toolsPage() {
      var active = tools[state.tool];
      var html = '<section class="fade">' +
        '<div class="card mb12"><p class="text">考古不是“挖宝”，而是记录、判断、保护和研究。</p></div>' +
        '<div class="grid3">';
      for (var i = 0; i < tools.length; i++) {
        var t = tools[i];
        html += '<button class="tab center ' + (i === state.tool ? 'active' : '') + '" data-tool="' + i + '" style="min-height:88px">' +
          '<div style="font-size:24px">' + t[0] + '</div><b class="small">' + t[1] + '</b>' +
        '</button>';
      }
      html += '</div>' +
        '<div class="card mt20"><div style="font-size:34px">' + active[0] + '</div><h3 class="mt8">' + active[1] + '</h3><p class="text mt10">' + active[2] + '</p></div>' +
      '</section>';
      return html;
    }

    function relicPage() {
      var active = relics[state.relic];
      var html = '<section class="fade">' +
        '<div class="visual mb12">' + visual(active[2]) + '</div>' +
        '<div class="grid3">';
      for (var i = 0; i < relics.length; i++) {
        var r = relics[i];
        html += '<button class="tab center ' + (i === state.relic ? 'active' : '') + '" data-relic="' + i + '" style="min-height:74px;padding:10px">' +
          '<div class="gold">' + r[1] + '</div><div class="small" style="line-height:1.45">' + r[0] + '</div>' +
        '</button>';
      }
      html += '</div>' +
        '<div class="seg mt16"><button class="' + (state.mode === 'pre' ? 'active' : '') + '" data-mode="pre">前世</button><button class="' + (state.mode === 'now' ? 'active' : '') + '" data-mode="now">今生</button></div>' +
        '<div class="card dark mt16"><div class="small gold" style="letter-spacing:.22em">' + active[1] + '</div><h3 class="mt8">' + active[0] + '</h3><p class="text mt12">' + (state.mode === 'pre' ? active[3] : active[4]) + '</p></div>' +
      '</section>';
      return html;
    }

    function peoplePage() {
      var active = people[state.person];
      var html = '<section class="fade">' +
        '<div class="card mb12"><p class="text">点击人物卡片，查看他们在发现、发掘、研究和保护中的贡献。</p></div>' +
        '<div class="stack">';
      for (var i = 0; i < people.length; i++) {
        var p = people[i];
        html += '<button class="tab ' + (i === state.person ? 'active' : '') + '" data-person="' + i + '">' +
          '<div class="row"><div class="icon-box">👤</div><div><b>' + p[0] + '</b><p class="small muted mt8">' + p[1] + '</p></div></div>' +
        '</button>';
      }
      html += '</div>' +
        '<div class="card dark mt20"><h3>' + active[0] + '</h3><p class="small gold mt8">' + active[1] + '</p><p class="text mt12">' + active[2] + '</p><div class="card gold-card mt16" style="border-radius:18px"><p class="small" style="line-height:1.8;color:#f4d38a">' + active[3] + '</p></div></div>' +
      '</section>';
      return html;
    }

    function meaningPage() {
      var html = '<section class="fade">' +
        '<div class="card mb12"><h3>拼出三星堆的意义</h3><p class="small muted mt8" style="line-height:1.7">点击四块拼图，理解三星堆不只是“神秘”。</p></div>' +
        '<div class="grid2">';
      for (var i = 0; i < meanings.length; i++) {
        var m = meanings[i];
        var on = state.pieces.indexOf(i) !== -1;
        html += '<button class="tab ' + (on ? 'active' : '') + '" data-piece="' + i + '" style="min-height:120px">' +
          '<div class="gold">★ ' + (on ? '✓' : '') + '</div><b>' + m[0] + '</b><p class="small muted mt8" style="line-height:1.7">' + m[1] + '</p>' +
        '</button>';
      }
      html += '</div>' +
        '<div class="card dark mt20"><div class="small gold" style="letter-spacing:.22em">升华主题</div><p class="text mt12">' +
        (state.pieces.length === 4 ? '三星堆的意义，不在于它有多神秘，而在于它让我们看见：中华文明由许多区域、许多人、许多代人的接力共同组成。' : '继续点亮拼图：从文物到文明，从发现到保护，从展柜到每个人的记忆。') +
        '</p></div>' +
      '</section>';
      return html;
    }

    function endingPage() {
      return '<section class="center fade" style="min-height:100%;display:flex;flex-direction:column;justify-content:center">' +
        '<div style="width:108px;height:108px;margin:0 auto 24px;border-radius:999px;border:1px solid rgba(212,174,98,.4);background:rgba(212,174,98,.15);display:grid;place-items:center;box-shadow:0 0 55px rgba(212,174,98,.25);font-size:42px">❤</div>' +
        '<h1 style="font-size:34px">文明苏醒时，<br>有人一直俯身。</h1>' +
        '<p class="text mt20">一百年，三星堆从泥土走向世界。一百年，考古人从未停止追问。他们不是唤醒了文物，而是让我们重新听见文明的回声。</p>' +
        '<button class="outline mt20" style="width:auto;padding-left:26px;padding-right:26px;border-radius:999px" id="restartBtn">再看一遍</button>' +
      '</section>';
    }

    function bindEvents() {
      var dotButtons = document.querySelectorAll('[data-page]');
      for (var i = 0; i < dotButtons.length; i++) {
        dotButtons[i].onclick = function () { go(Number(this.getAttribute('data-page'))); };
      }

      var startBtn = byId('startBtn');
      if (startBtn) startBtn.onclick = function () { go(1); };

      var restartBtn = byId('restartBtn');
      if (restartBtn) restartBtn.onclick = function () { go(0); };

      var cleanRange = byId('cleanRange');
      if (cleanRange) {
        cleanRange.oninput = function () {
          state.clean = Number(cleanRange.value);
          render();
        };
      }

      var lineButtons = document.querySelectorAll('[data-line]');
      for (var a = 0; a < lineButtons.length; a++) {
        lineButtons[a].onclick = function () {
          state.line = Number(this.getAttribute('data-line'));
          render();
        };
      }

      var toolButtons = document.querySelectorAll('[data-tool]');
      for (var b = 0; b < toolButtons.length; b++) {
        toolButtons[b].onclick = function () {
          state.tool = Number(this.getAttribute('data-tool'));
          render();
        };
      }

      var relicButtons = document.querySelectorAll('[data-relic]');
      for (var c = 0; c < relicButtons.length; c++) {
        relicButtons[c].onclick = function () {
          state.relic = Number(this.getAttribute('data-relic'));
          render();
        };
      }

      var modeButtons = document.querySelectorAll('[data-mode]');
      for (var d = 0; d < modeButtons.length; d++) {
        modeButtons[d].onclick = function () {
          state.mode = this.getAttribute('data-mode');
          render();
        };
      }

      var personButtons = document.querySelectorAll('[data-person]');
      for (var e = 0; e < personButtons.length; e++) {
        personButtons[e].onclick = function () {
          state.person = Number(this.getAttribute('data-person'));
          render();
        };
      }

      var pieceButtons = document.querySelectorAll('[data-piece]');
      for (var f = 0; f < pieceButtons.length; f++) {
        pieceButtons[f].onclick = function () {
          var index = Number(this.getAttribute('data-piece'));
          var pos = state.pieces.indexOf(index);
          if (pos === -1) {
            state.pieces.push(index);
          } else {
            state.pieces.splice(pos, 1);
          }
          render();
        };
      }
    }

    byId('prev').onclick = function () { go(state.page - 1); };
    byId('next').onclick = function () { go(state.page + 1); };

    document.addEventListener('keydown', function (event) {
      if (event.key === 'ArrowDown' || event.key === 'PageDown' || event.key === ' ') go(state.page + 1);
      if (event.key === 'ArrowUp' || event.key === 'PageUp') go(state.page - 1);
    });

    render();
  </script>
</body>
</html>
